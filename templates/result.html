<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:600px;
margin:auto;
box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

h1{
color:#333;
}

.score{
font-size:28px;
font-weight:bold;
color:#4CAF50;
}

.progress{
width:100%;
background:#ddd;
border-radius:20px;
margin:20px 0;
}

.progress-bar{
height:20px;
background:#4CAF50;
border-radius:20px;
}

.section{
margin-top:30px;
text-align:left;
}

ul{
padding-left:20px;
}

li{
margin:8px 0;
}

.skill{
background:#ffebee;
padding:8px;
border-radius:5px;
display:inline-block;
margin:5px;
}

.suggestion{
background:#e3f2fd;
padding:8px;
border-radius:5px;
display:block;
margin:5px 0;
}

button{
margin-top:30px;
padding:12px 25px;
background:#4CAF50;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Resume Analysis Result</h1>

<h2>Best Matched Role</h2>
<h1>{{ role }}</h1>

<div class="score">Match Score: {{ score }}%</div>

<div class="progress">
<div class="progress-bar" style="width: {{ score }}%"></div>
</div>

<div class="section">

<h3>⚠ Missing Skills</h3>

{% for skill in missing %}
<span class="skill">{{ skill }}</span>
{% endfor %}

</div>

<div class="section">

<h3>🧠 AI Suggestions</h3>

{% for s in suggestions %}
<div class="suggestion">{{ s }}</div>
{% endfor %}

</div>

<a href="/">
<button>Analyze Another Resume</button>
</a>

</div>

</body>
</html>
