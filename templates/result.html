<!DOCTYPE html>
<html>
<head>
<title>Analysis Result</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:500px;
}

.score{
font-size:28px;
font-weight:bold;
color:#667eea;
}

.progress{
width:100%;
background:#eee;
border-radius:10px;
overflow:hidden;
margin:15px 0;
}

.progress-bar{
height:20px;
background:#667eea;
width:{{score}}%;
}

ul{
text-align:left;
}

button{
background:#667eea;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#5a67d8;
}

</style>

</head>

<body>

<div class="container">

<h2>Analysis Result</h2>

<h3>Best Matched Role</h3>

<p><b>{{ role }}</b></p>

<h3>Match Score</h3>

<div class="progress">
<div class="progress-bar"></div>
</div>

<p class="score">{{ score }}%</p>

<h3>Missing Skills</h3>

<ul>

{% for skill in missing %}
<li>{{ skill }}</li>
{% endfor %}

</ul>

<br>

<a href="/"><button>Analyze Another Resume</button></a>

</div>

</body>
</html>
