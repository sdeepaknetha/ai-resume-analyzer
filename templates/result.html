<!DOCTYPE html>
<html>
<head>

<title>AI Resume Result</title>

<style>

body{
font-family:Arial;
background:#f2f4ff;
text-align:center;
}

.card{
background:white;
width:500px;
margin:auto;
margin-top:80px;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h1{
color:#333;
}

.score{
font-size:28px;
color:green;
}

ul{
text-align:left;
}

.btn{
margin-top:20px;
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h1>AI Resume Analysis Result</h1>

<h2>Best Matched Role</h2>
<p><b>{{role}}</b></p>

<h2>Match Score</h2>
<p class="score">{{score}}%</p>

<h2>⚠ Missing Skills</h2>

<ul>
{% for skill in missing %}
<li>{{skill}}</li>
{% endfor %}
</ul>

<h2>🧠 AI Suggestions</h2>

<ul>
{% for s in suggestions %}
<li>{{s}}</li>
{% endfor %}
</ul>

<a href="/" class="btn">Analyze Another Resume</a>

</div>

</body>
</html>
