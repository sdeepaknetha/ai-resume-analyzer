<!DOCTYPE html>
<html>

<head>

<title>Analysis Result</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:500px;
margin:auto;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

ul{
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>Analysis Result</h2>

<h3>Best Matched Role: {{ role }}</h3>

<h3>Match Score: {{ score }}%</h3>

<h3>Missing Skills:</h3>

<ul>

{% for skill in missing %}

<li>{{ skill }}</li>

{% endfor %}

</ul>

<br>

<a href="/">Analyze Another Resume</a>

</div>

</body>

</html>
