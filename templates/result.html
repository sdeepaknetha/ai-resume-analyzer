<!DOCTYPE html>
<html>
<head>

<title>Analysis Result</title>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>AI Resume Analysis Result</h1>

<h2>Best Matched Role</h2>
<p>{{ role }}</p>

<h2>Match Score</h2>
<p>{{ score }}%</p>

<h2>Missing Skills</h2>

<ul>
{% for skill in missing %}
<li>{{ skill }}</li>
{% endfor %}
</ul>

<h2>AI Suggestions</h2>

<ul>
{% for s in suggestions %}
<li>{{ s }}</li>
{% endfor %}
</ul>

<br>

<a href="/">Analyze Another Resume</a>

</div>

</body>
</html>
