<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:400px;
}

h1{
margin-bottom:20px;
}

input[type=file]{
margin:20px 0;
}

button{
background:#667eea;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#5a67d8;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Resume Analyzer</h1>

<p>Upload your Resume (PDF or DOCX)</p>

<form action="/analyze" method="POST" enctype="multipart/form-data">

<input type="file" name="resume" required>

<br>

<button type="submit">Analyze Resume</button>

</form>

</div>

</body>
</html>
