<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>
</head>
<body>
    <h2>Best Matched Role: {{ role }}</h2>
    <h3>Match Score: {{ score }}%</h3>

    <h3>Missing Skills:</h3>
    <ul>
        {% for skill in missing %}
            <li>{{ skill }}</li>
        {% endfor %}
    </ul>

    <a href="/">Analyze Another Resume</a>
</body>
</html>
